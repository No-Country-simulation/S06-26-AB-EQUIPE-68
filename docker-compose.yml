version: "3.9"

services:
  mysql:
    image: mysql:8.4
    container_name: bitapp-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: db_bitapp
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bitapp-backend
    restart: on-failure:5
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env.production
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    image: nginx:alpine
    container_name: bitapp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 3

  n8n:
    image: n8nio/n8n:latest
    container_name: bitapp-n8n
    restart: unless-stopped
    ports:
      - "5679:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_DEFAULT_BINARY_DATA_MODE: filesystem
    volumes:
      - n8n_data:/home/node/.n8n
      - ./n8n/bitapp-agent-workflow.json:/home/node/.n8n/import/workflows/bitapp-agent-workflow.json:ro

volumes:
  mysql_data:
  n8n_data:

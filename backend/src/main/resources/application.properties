# ============================================================================
# application.properties - App BiT (arquitetura n8n)
# ============================================================================
# Segredos NUNCA ficam aqui. Use variaveis de ambiente.
# Formato: ${NOME_DA_VARIAVEL:valor_padrao_para_dev_local}
# ============================================================================

# ----- Servidor -----
server.port=${SERVER_PORT:8080}

# ----- Banco de Dados -----
# Em dev local (sem variaveis): usa H2 em memoria
# Em producao: define DB_URL/DB_USERNAME/DB_PASSWORD via ambiente
spring.datasource.url=${DB_URL:jdbc:h2:mem:bitapp;DB_CLOSE_DELAY=-1;MODE=MySQL}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# ----- JPA / Hibernate -----
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# ----- Console H2 (util em dev) -----
spring.h2.console.enabled=true

# ----- JWT (Seguranca) -----
jwt.secret=${JWT_SECRET:dev-secret-only-change-in-production-min-512-bits-long-key-here}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ----- Integracao n8n (Agente de IA) -----
n8n.assessment.url=${N8N_ASSESSMENT_URL:http://localhost:5678/webhook/bit/agent}
n8n.mental-health.url=${N8N_MENTAL_HEALTH_URL:http://localhost:5678/webhook/bit/agent}
n8n.timeout=${N8N_TIMEOUT:10000}
n8n.max-retries=${N8N_MAX_RETRIES:3}

# ----- Dataset Visent (ingestao de CSVs) -----
visent.enabled=${VISENT_ENABLED:false}

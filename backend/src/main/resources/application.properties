# ===== Banco de dados H2 (em memoria) =====
spring.datasource.url=jdbc:h2:mem:appbitdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.jpa.open-in-view=false

# ===== Gemini API =====
# A chave vem da variavel de ambiente GEMINI_API_KEY (Render) ou usa fallback local
spring.gemini.api-key=${GEMINI_API_KEY:SUA_CHAVE_AQUI}
spring.gemini.endpoint=https://generativelanguage.googleapis.com/v1beta/models
spring.gemini.model=gemini-2.5-flash
spring.gemini.temperature=0.7
spring.gemini.candidate-count=1

# ===== Servidor =====
server.port=${PORT:8080}
